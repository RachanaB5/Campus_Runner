# Production docker-compose override - use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

version: "3.9"

services:
  backend:
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
      - LOG_LEVEL=WARN
    restart: always
    volumes: [] # No local volumes in production

  frontend:
    environment:
      - VITE_ENVIRONMENT=production
    restart: always
    volumes: [] # No local volumes in production
