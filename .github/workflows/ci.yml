name: CI

on:
  push:
    branches: [main, master, "feature/**", "fix/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      contains(toJson(github.event.commits.*.modified), 'backend/')
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt pytest-cov

      - name: Run full backend test suite
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          FLASK_ENV: testing
          JWT_SECRET_KEY: github-actions-test-secret-key
        run: |
          python -m pytest backend/tests/ -q --tb=short \
            --cov=backend --cov-report=xml --cov-report=term-missing \
            --junitxml=backend-test-results.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-results-py${{ matrix.python-version }}
          path: |
            coverage.xml
            backend-test-results.xml
          retention-days: 14

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-setup:
    name: Install Node deps
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      contains(toJson(github.event.commits.*.modified), 'src/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  frontend-lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: frontend-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run lint

          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - name: Run full frontend test suite
        run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage
          retention-days: 14

  frontend-build:
    name: Build
    runs-on: ubuntu-latest
    needs: [frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 14
