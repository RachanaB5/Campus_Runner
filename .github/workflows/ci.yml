name: CI

on:
  push:
    branches: [main, master, "feature/**", "fix/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt pytest-cov
      - name: Run recent backend regression tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          FLASK_ENV: testing
          JWT_SECRET_KEY: github-actions-test-secret-key
        run: |
          python -m pytest -q --tb=short \
            backend/tests/test_orders_and_notifications.py::test_cancel_paid_order_marks_refund_and_releases_runner \
            backend/tests/test_runner_and_delivery.py::test_runner_cannot_accept_new_order_while_active_delivery_exists
      - name: Run recent backend tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          FLASK_ENV: testing
          JWT_SECRET_KEY: github-actions-test-secret-key
        run: |
          python -m pytest -q --tb=short \
            backend/tests/test_orders_and_notifications.py::test_cancel_paid_order_marks_refund_and_releases_runner \
            backend/tests/test_runner_and_delivery.py::test_runner_cannot_accept_new_order_while_active_delivery_exists \
            --cov=backend --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  frontend-lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run recent frontend smoke tests
        run: npm run test -- src/app/services/api.test.ts src/app/hooks/useSocket.test.ts
      - name: Run recent frontend smoke tests with coverage
        run: npm run test:coverage -- src/app/services/api.test.ts src/app/hooks/useSocket.test.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage
          retention-days: 7

  frontend-build:
    name: Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-typecheck, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 7
